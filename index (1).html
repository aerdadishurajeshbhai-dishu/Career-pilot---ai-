<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerPilot AI</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.header{
text-align:center;
padding:15px;
font-size:26px;
font-weight:bold;
color:#38bdf8;
}

/* LAYOUT */
.container{
display:flex;
height:90vh;
}

/* LEFT FEATURES */
.left{
width:35%;
background:rgba(255,255,255,0.05);
padding:15px;
overflow:auto;
}

.card{
background:rgba(255,255,255,0.08);
padding:10px;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
}

.card:hover{
background:#2563eb;
}

/* RIGHT CHAT */
.right{
width:65%;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
padding:15px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:10px;
border-radius:10px;
max-width:75%;
}

.user{background:#2563eb;align-self:flex-end;}
.bot{background:rgba(255,255,255,0.1);align-self:flex-start;}

/* INPUT */
.inputBox{
display:flex;
padding:10px;
gap:10px;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}
button:hover{background:#2563eb;}
</style>
</head>

<body>

<div class="header">🚀 CareerPilot AI - Feature Version</div>

<div class="container">

<!-- LEFT FEATURES -->
<div class="left">

<div class="card" onclick="quick('resume')">📄 Resume Analyzer</div>
<div class="card" onclick="quick('job')">🎯 Job Matcher</div>
<div class="card" onclick="quick('interview')">🎤 Mock Interview</div>
<div class="card" onclick="quick('skills')">🧠 Skill Builder</div>
<div class="card" onclick="quick('career')">📊 Career Roadmap</div>
<div class="card" onclick="quick('ai')">🤖 AI Career Advice</div>

</div>

<!-- CHAT -->
<div class="right">

<div class="chat" id="chat">
<div class="msg bot">👋 Welcome to CareerPilot AI</div>
</div>

<div class="inputBox">
<input id="input" placeholder="Ask your question..." />
<button onclick="send()">Send</button>
</div>

</div>

</div>

<script>

function addMsg(text,cls){
let div=document.createElement("div");
div.className="msg "+cls;
div.innerText=text;
document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop=999999;
}

/* SMART ENGINE */
function getAnswer(text){

text=text.toLowerCase();

if(text.includes("resume")){
return "📄 Resume Tips: Keep 1 page, add skills, projects, ATS keywords.";
}

if(text.includes("job")){
return "🎯 Apply on LinkedIn daily + build projects + update profile.";
}

if(text.includes("interview")){
return "🎤 Practice HR + DSA + communication skills daily.";
}

if(text.includes("skill")){
return "🧠 Learn Python, JavaScript, AI basics, and communication.";
}

if(text.includes("career")){
return "📊 Step 1: Skills → Step 2: Projects → Step 3: Internship → Step 4: Job.";
}

if(text.includes("ai")){
return "🤖 AI Path: Learn Python → ML → Projects → Kaggle → Internship.";
}

return "💡 Keep learning, build projects, stay consistent 🚀";
}

/* SEND */
function send(){

let input=document.getElementById("input");
let text=input.value.trim();

if(!text){
alert("Type something!");
return;
}

addMsg(text,"user");

setTimeout(()=>{
addMsg("🤖 "+getAnswer(text),"bot");
},500);

input.value="";
}

/* QUICK BUTTONS */
function quick(type){

let msg="";

if(type==="resume") msg="How to improve resume?";
if(type==="job") msg="How to get job?";
if(type==="interview") msg="Interview tips?";
if(type==="skills") msg="Best skills to learn?";
if(type==="career") msg="Career roadmap?";
if(type==="ai") msg="AI career advice?";

document.getElementById("input").value=msg;
send();
}

</script>

</body>
</html>
