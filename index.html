<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareerPilot AI - Final Polish</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

header{
    text-align:center;
    padding:25px;
    background:#111827;
}

h1{color:#38bdf8}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

input,textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0ea5e9;
}

.result{
    margin-top:10px;
    color:#22c55e;
}

/* progress */
.progress{
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin-top:8px;
}

.bar{
    height:12px;
    width:0%;
    background:#38bdf8;
    transition:1s;
}
</style>
</head>

<body>

<header>
<h1>🚀 CareerPilot AI</h1>
<p>AI Career Mentor Platform</p>
</header>

<div class="container">

<!-- RESUME -->
<div class="card">
<h2>📄 Resume Analyzer</h2>
<textarea id="resume" placeholder="Paste resume..."></textarea>

<input type="file" onchange="loadFile(event)">

<button onclick="analyzeResume()">Analyze Resume</button>

<div id="resumeResult" class="result"></div>
</div>

<!-- JOB MATCH -->
<div class="card">
<h2>💼 Job Matcher</h2>
<input id="skills" placeholder="Enter skills">
<button onclick="jobMatch()">Find Jobs</button>
<div id="jobResult" class="result"></div>
</div>

<!-- VOICE INTERVIEW -->
<div class="card">
<h2>🎤 Voice Interview</h2>
<button onclick="startInterview()">Start Interview</button>
<p id="qBox"></p>
<div id="scoreBox" class="result"></div>
</div>

<!-- ROADMAP -->
<div class="card">
<h2>📊 Career Roadmap</h2>
<input id="goal" placeholder="Frontend / Backend / Data">
<button onclick="roadmap()">Generate Roadmap</button>
<div id="roadmapResult" class="result"></div>
</div>

<!-- DASHBOARD -->
<div class="card">
<h2>📈 Job Readiness Score</h2>

HTML
<div class="progress"><div class="bar" id="h"></div></div>

JS
<div class="progress"><div class="bar" id="j"></div></div>

AI Thinking
<div class="progress"><div class="bar" id="a"></div></div>

<button onclick="showProgress()">Calculate Score</button>
</div>

<!-- REPORT -->
<div class="card">
<h2>📄 Download Report</h2>
<button onclick="downloadReport()">Download AI Report</button>
</div>

</div>

<script>

let resumeText = "";

/* FILE LOAD */
function loadFile(event){
    let file = event.target.files[0];
    let reader = new FileReader();

    reader.onload = function(){
        resumeText = reader.result;
        document.getElementById("resume").value = resumeText;
    }

    reader.readAsText(file);
}
