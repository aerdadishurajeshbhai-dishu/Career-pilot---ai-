<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Career Pilot AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#1e88e5,#8e24aa);
  color:white;
  text-align:center;
}

header{
  padding:20px;
}

.card{
  background:white;
  color:black;
  margin:20px auto;
  padding:20px;
  width:85%;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

button{
  padding:10px 15px;
  margin:8px;
  border:none;
  border-radius:8px;
  background:#1e88e5;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#0d47a1;
}

input{
  padding:10px;
  width:70%;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>🚀 Career Pilot AI</h1>
<p>Your Smart Career Guidance System</p>
</header>

<!-- ABOUT -->
<div class="card">
<h2>📌 About Project</h2>
<p>
Career Pilot AI helps students choose best career using quiz, AI mentor and roadmap.
It also provides exam guidance like JEE, NEET and UPSC.
</p>
</div>

<!-- QUIZ -->
<div class="card">
<h2>🧠 Career Quiz</h2>
<button onclick="quiz()">Start Quiz</button>
<p id="qres"></p>
</div>

<!-- ROADMAP -->
<div class="card">
<h2>🧭 Career Roadmap</h2>
<p id="road"></p>
</div>

<!-- EXAMS -->
<div class="card">
<h2>📚 Exam Guidance</h2>
<button onclick="exam('jee')">JEE</button>
<button onclick="exam('neet')">NEET</button>
<button onclick="exam('upsc')">UPSC</button>
<p id="exam"></p>
</div>

<!-- AI -->
<div class="card">
<h2>🤖 AI Mentor</h2>
<input id="ask" placeholder="Ask career question">
<br>
<button onclick="ai()">Ask</button>
<p id="ans"></p>
</div>

<script>

function quiz(){

  let score=0;

  let a=prompt("Do you like coding? yes/no");
  let b=prompt("Do you like maths? yes/no");
  let c=prompt("Do you like business? yes/no");

  if(a=="yes") score+=40;
  if(b=="yes") score+=30;
  if(c=="yes") score+=30;

  let career="";

  if(score>=70){
    career="Software Developer 💻";
  }
  else if(score>=50){
    career="Data Analyst 📊";
  }
  else{
    career="Business / Marketing 📈";
  }

  document.getElementById("qres").innerHTML =
  "Score: "+score+"/100<br>Career: "+career;

  if(career.includes("Software")){
    document.getElementById("road").innerHTML =
    "HTML → CSS → JS → React → Projects";
  }
  else if(career.includes("Data")){
    document.getElementById("road").innerHTML =
    "Excel → SQL → Python → Data Projects";
  }
  else{
    document.getElementById("road").innerHTML =
    "Communication → Business Skills → Internship";
  }
}

function exam(type){

  if(type=="jee"){
    document.getElementById("exam").innerHTML=
    "JEE: Physics + Maths + Mock Tests";
  }
  if(type=="neet"){
    document.getElementById("exam").innerHTML=
    "NEET: Biology + Chemistry NCERT";
  }
  if(type=="upsc"){
    document.getElementById("exam").innerHTML=
    "UPSC: GK + Polity + Current Affairs";
  }
}

function ai(){

  let q=document.getElementById("ask").value;
  let r="";

  if(q.includes("after 12th")){
    r="Choose stream based on interest: Science/Commerce/IT";
  }
  else if(q.includes("software")){
    r="Start with HTML, CSS, JavaScript";
  }
  else{
    r="Focus on skills + projects + practice";
  }

  document.getElementById("ans").innerHTML=r;
}

</script>

</body>
</html>
