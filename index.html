<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerPilot AI</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#0b1220,#05070f);
color:white;
}

.header{
text-align:center;
padding:18px;
font-size:30px;
font-weight:bold;
color:#38bdf8;
letter-spacing:1px;
}

.container{
display:flex;
height:90vh;
}

.left{
width:30%;
background:rgba(255,255,255,0.05);
padding:15px;
}

.card{
background:rgba(255,255,255,0.08);
padding:12px;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
background:#2563eb;
transform:scale(1.03);
}

.right{
width:70%;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
padding:15px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:10px;
border-radius:10px;
max-width:75%;
white-space:pre-line;
animation:fade 0.3s ease-in;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.user{background:#2563eb;align-self:flex-end;}
.bot{background:rgba(255,255,255,0.1);align-self:flex-start;}

.inputBox{
display:flex;
padding:10px;
gap:10px;
border-top:1px solid rgba(255,255,255,0.1);
}

input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
outline:none;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.tag{
font-size:12px;
opacity:0.7;
}
</style>
</head>

<body>

<div class="header">🚀 CareerPilot AI <div class="tag">Your Smart Career Assistant</div></div>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="card" onclick="quick('resume')">📄 Resume Analyzer</div>
<div class="card" onclick="quick('job')">🎯 Job Guidance</div>
<div class="card" onclick="quick('interview')">🎤 Interview Prep</div>
<div class="card" onclick="quick('skills')">🧠 Skill Builder</div>
<div class="card" onclick="quick('career')">📊 Career Roadmap</div>

</div>

<!-- CHAT -->
<div class="right">

<div class="chat" id="chat">
<div class="msg bot">👋 Hi! I am CareerPilot AI. Ask me anything about your career.</div>
</div>

<div class="inputBox">
<input id="input" placeholder="Ask your question..." />
<button onclick="send()">Send</button>
</div>

</div>

</div>

<script>

function addMsg(text,cls){
let div=document.createElement("div");
div.className="msg "+cls;
div.innerText=text;
document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop=999999;
}

function getAI(text){
text=text.toLowerCase();

if(text.includes("resume")){
return "📄 Resume Tips:\n• Add projects\n• Add skills\n• Keep 1 page\n• Use ATS keywords\n• Make it clean & simple";
}

if(text.includes("job")){
return "🎯 Job Strategy:\n• Apply daily\n• Improve LinkedIn\n• Build 2–3 projects\n• Do internships if possible";
}

if(text.includes("interview")){
return "🎤 Interview Prep:\n• HR questions practice\n• Basic DSA\n• Communication skills\n• Confidence matters most";
}

if(text.includes("skill")){
return "🧠 Skills to Learn:\n• Python\n• JavaScript\n• DSA\n• AI basics\n• Communication skills";
}

if(text.includes("career")){
return "📊 Career Roadmap:\nStep 1: Learn Skills\nStep 2: Build Projects\nStep 3: Internship\nStep 4: Job\nStep 5: Growth";
}

return "💡 Keep learning, stay consistent, and build real projects 🚀";
}

function send(){

let input=document.getElementById("input");
let text=input.value.trim();

if(!text){
alert("Please type something!");
return;
}

addMsg(text,"user");

setTimeout(()=>{
addMsg("🤖 "+getAI(text),"bot");
},500);

input.value="";
}

function quick(type){

let msg="";

if(type==="resume") msg="How to improve my resume?";
if(type==="job") msg="How to get job?";
if(type==="interview") msg="Interview preparation tips?";
if(type==="skills") msg="Best skills to learn?";
if(type==="career") msg="Career roadmap?";

document.getElementById("input").value=msg;
send();
}

</script>

</body>
</html>
